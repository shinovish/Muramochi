<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>メッセージ | 卒業記念サイト</title>
  <meta name="description" content="ファンからのメッセージ一覧ページです。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="site-shell">
    <header class="page-header">
      <a class="text-link" href="index.html">← トップへ戻る</a>
      <h1>メッセージ</h1>
      <p>ファンのみなさんから届いた言葉を掲載しています。</p>
    </header>

    <main>
      <section id="message-list" class="stack" aria-live="polite">
        <div class="loading-card">メッセージを読み込み中です…</div>
      </section>
    </main>
  </div>

  <script>
    async function loadMessages() {
      const messageList = document.getElementById('message-list');

      try {
        const [fansRes, messagesRes] = await Promise.all([
          fetch('data/fans.json'),
          fetch('data/messages.json')
        ]);

        if (!fansRes.ok || !messagesRes.ok) {
          throw new Error('データの取得に失敗しました。');
        }

        const fans = await fansRes.json();
        const messages = await messagesRes.json();

        const fansMap = new Map(fans.map((fan) => [fan.id, fan]));
        const merged = messages
          .map((entry) => {
            const fan = fansMap.get(entry.fanId);
            if (!fan) return null;
            return {
              fanId: entry.fanId,
              name: fan.name,
              message: entry.message
            };
          })
          .filter(Boolean);

        if (merged.length === 0) {
          messageList.innerHTML = '<div class="loading-card">まだメッセージがありません。</div>';
          return;
        }

        messageList.innerHTML = merged.map((item) => `
          <article class="message-card">
            <p class="fan-name"><span class="fan-name-text">${item.name}</span><span class="fan-id">@${item.fanId}</span></p>
            <p class="message-body">${item.message}</p>
            <div class="card-actions">
              <a class="button-link secondary" href="album.html?fan=${encodeURIComponent(item.fanId)}">アルバム</a>
            </div>
          </article>
        `).join('');
      } catch (error) {
        messageList.innerHTML = `
          <div class="loading-card error">
            メッセージの表示に失敗しました。ファイル配置をご確認ください。
          </div>
        `;
        console.error(error);
      }
    }

    loadMessages();
  </script>
</body>
</html>
