<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アルバム | 卒業記念サイト</title>
  <meta name="description" content="ファンごとのJPEGアルバム一覧ページです。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="site-shell">
    <header class="page-header">
      <a class="text-link" href="messages.html">← メッセージへ戻る</a>
      <h1>アルバム</h1>
      <p id="album-description">アルバムを読み込み中です…</p>
    </header>

    <main>
      <section id="album-grid" class="album-grid" aria-live="polite">
        <div class="loading-card">JPEG一覧を読み込み中です…</div>
      </section>
    </main>
  </div>

  <script>
    async function loadAlbum() {
      const params = new URLSearchParams(window.location.search);
      const fanId = params.get('fan');
      const albumGrid = document.getElementById('album-grid');
      const description = document.getElementById('album-description');

      if (!fanId) {
        description.textContent = '表示するファンが指定されていません。';
        albumGrid.innerHTML = '<div class="loading-card error">fan パラメータを指定してください。</div>';
        return;
      }

      try {
        const [fansRes, albumRes] = await Promise.all([
          fetch('data/fans.json'),
          fetch(`data/albums/${encodeURIComponent(fanId)}.json`)
        ]);

        if (!fansRes.ok || !albumRes.ok) {
          throw new Error('アルバムデータの取得に失敗しました。');
        }

        const fans = await fansRes.json();
        const album = await albumRes.json();
        const fan = fans.find((item) => item.id === fanId);

        description.textContent = fan
          ? `${fan.name}さんに紐づくJPEGファイル一覧です。`
          : '指定されたファンのJPEGファイル一覧です。';

        if (!album.images || album.images.length === 0) {
          albumGrid.innerHTML = '<div class="loading-card">まだJPEGファイルが登録されていません。</div>';
          return;
        }

        albumGrid.innerHTML = album.images.map((image, index) => `
          <article class="album-card">
            <a href="${image.src}" target="_blank" rel="noopener noreferrer">
              <img src="${image.src}" alt="${image.alt || `album image ${index + 1}`}" loading="lazy" />
            </a>
            <p class="album-caption">${image.caption || `JPEG ${index + 1}`}</p>
            <p class="album-file">${image.src.split('/').pop()}</p>
          </article>
        `).join('');
      } catch (error) {
        description.textContent = 'アルバムの表示に失敗しました。';
        albumGrid.innerHTML = `
          <div class="loading-card error">
            アルバムの表示に失敗しました。data/albums 配下のJSONと画像ファイルをご確認ください。
          </div>
        `;
        console.error(error);
      }
    }

    loadAlbum();
  </script>
</body>
</html>
